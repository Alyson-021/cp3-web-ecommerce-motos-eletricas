<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Conectando o CSS -->
    <link rel="stylesheet" href="./src/css/estilo.css">

    <title>EletroRide</title>
</head>
<body>

    <!-- Cabeçalho do site -->
    <header>
        <h1>EletroRide</h1>

        <!-- Navegação Principal -->
        <nav>
            <a href="index.html">Início</a>
            <a href="./pages/catalogo.html">Catálogo</a>
            <a href="./pages/loja.html">Loja</a>
            <a href="./pages/sobre.html">Sobre</a>
        </nav>
    </header>

    <main>
        <!-- Banner Inicial -->
        <section class="banner">
            <h2>O futuro das motos elétricas</h2>
            <p>Tecnologia, economia e performance em um só lugar.</p>
        </section>

    
        <!-- Área onde os produtos serão inseridos via DOM -->
        <section id="produtos">
            <h2>Catálogo de Motos</h2>
            <!-- Onde o DOM vai inserir os cards -->
            <div id="container-produtos"></div>
        </section>
    </main>

    <!-- Mensagem animada ao adicionar produtos no carrinho -->
    <div id="toast">
        Produto adicionado ao carrinho
    </div>

    <!-- Rodapé -->
    <footer>
        <p>© 2026 EletroRide - Todos os direitos reservados</p>
    </footer>

    <!-- Conectando o JavaScript -->
    <script src="./src/js/script.js"></script>
    
</body>
</html>
